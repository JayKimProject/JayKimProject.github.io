<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jay Kim — GitHub Projects</title>
<meta name="description" content="Selected projects and code repositories by Jay Kim, AI/ML Engineer.">
<link rel="icon" href="https://avatars.githubusercontent.com/u/161681874?v=4">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c232c;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --accent-2: #1f6feb;
    --good: #3fb950;
    --chip: #21262d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

  header.site {
    background: linear-gradient(135deg, #0d1117 0%, #1f2937 100%);
    border-bottom: 1px solid var(--border);
    padding: 36px 24px;
  }
  header.site .inner { max-width: 1100px; margin: 0 auto; display: flex; gap: 20px; align-items: center; }
  header.site img.avatar { width: 84px; height: 84px; border-radius: 50%; border: 2px solid var(--border); }
  header.site h1 { margin: 0 0 4px 0; font-size: 28px; }
  header.site p.tag { margin: 0; color: var(--muted); font-size: 14px; max-width: 720px; }
  header.site .links { margin-top: 8px; display: flex; gap: 14px; flex-wrap: wrap; font-size: 14px; }

  .toolbar {
    display: flex; flex-wrap: wrap; gap: 10px;
    align-items: center; justify-content: space-between;
    margin: 24px 0 18px;
  }
  .toolbar input, .toolbar select {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; font-size: 14px;
  }
  .toolbar input { flex: 1 1 280px; min-width: 200px; }
  .toolbar .stat { color: var(--muted); font-size: 13px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 14px; }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
    cursor: pointer; transition: border-color .15s, transform .15s;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card .name { font-weight: 600; font-size: 16px; color: var(--accent); word-break: break-word; }
  .card .desc { color: var(--muted); font-size: 14px; flex: 1; }
  .card .meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
  .card .lang { display: inline-flex; align-items: center; gap: 6px; }
  .lang .dot { width: 10px; height: 10px; border-radius: 50%; background: #888; display: inline-block; }
  .chip { background: var(--chip); color: var(--text); border-radius: 999px; padding: 2px 9px; font-size: 11px; border: 1px solid var(--border); }
  .topics { display: flex; flex-wrap: wrap; gap: 6px; }

  /* Detail view */
  .detail-toolbar {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin: 10px 0 18px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 14px; font-size: 14px; cursor: pointer;
    text-decoration: none;
  }
  .btn:hover { background: var(--panel-2); border-color: var(--accent); text-decoration: none; }
  .btn.primary { background: var(--accent-2); border-color: var(--accent-2); color: white; }
  .btn.primary:hover { filter: brightness(1.1); }
  .repo-title { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin: 6px 0; }
  .repo-title h2 { margin: 0; font-size: 24px; }
  .repo-title .sub { color: var(--muted); font-size: 14px; }
  .repo-meta { display: flex; gap: 16px; flex-wrap: wrap; color: var(--muted); font-size: 13px; margin-bottom: 14px; }

  .readme {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 24px 28px;
  }
  .readme h1, .readme h2, .readme h3, .readme h4 {
    border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-top: 24px;
  }
  .readme h1:first-child { margin-top: 0; }
  .readme code {
    background: #1c232c; border-radius: 4px; padding: 2px 6px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px;
  }
  .readme pre {
    background: #010409; border: 1px solid var(--border);
    padding: 14px; border-radius: 6px; overflow-x: auto;
  }
  .readme pre code { background: none; padding: 0; }
  .readme img { max-width: 100%; border-radius: 6px; }
  .readme a { color: var(--accent); }
  .readme table { border-collapse: collapse; width: 100%; }
  .readme th, .readme td { border: 1px solid var(--border); padding: 6px 10px; }
  .readme blockquote { border-left: 3px solid var(--border); margin: 0; padding: 4px 14px; color: var(--muted); }

  .empty, .loading, .error {
    text-align: center; color: var(--muted); padding: 60px 20px;
  }
  .error { color: #f85149; }
  .spinner {
    width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite; display: inline-block; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer.site {
    border-top: 1px solid var(--border); margin-top: 60px; padding: 24px;
    color: var(--muted); font-size: 13px; text-align: center;
  }

  /* Language colors */
  .l-Python { background: #3572A5; }
  .l-Jupyter { background: #DA5B0B; }
  .l-JavaScript { background: #f1e05a; }
  .l-TypeScript { background: #3178c6; }
  .l-HTML { background: #e34c26; }
  .l-CSS { background: #563d7c; }
  .l-Java { background: #b07219; }
  .l-CPP { background: #f34b7d; }
  .l-Shell { background: #89e051; }
  .l-Go { background: #00ADD8; }
  .l-R { background: #198CE7; }
  .l-Other { background: #888; }
</style>
</head>
<body>

<header class="site">
  <div class="inner">
    <img class="avatar" src="https://avatars.githubusercontent.com/u/161681874?v=4" alt="Jay Kim avatar">
    <div>
      <h1>Jay Kim — GitHub Projects</h1>
      <p class="tag">AI/ML Engineer · LLMs, RAG, AI Agents · 10+ years building production ML systems</p>
      <div class="links">
        <a href="https://github.com/JayKimProject" target="_blank" rel="noopener">GitHub Profile</a>
        <a href="https://www.linkedin.com/in/jay-kim-0a0433120/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://medium.com/@bravekjh" target="_blank" rel="noopener">Medium</a>
      </div>
    </div>
  </div>
</header>

<main class="container">

  <!-- LIST VIEW -->
  <section id="list-view">
    <div class="toolbar">
      <input id="search" type="search" placeholder="Search repositories by name, description, topic, or language…">
      <select id="sort">
        <option value="updated">Recently updated</option>
        <option value="created">Newest</option>
        <option value="pushed">Recently pushed</option>
        <option value="stars">Most stars</option>
        <option value="name">Name (A–Z)</option>
      </select>
      <span class="stat" id="stat"></span>
    </div>
    <div id="grid" class="grid"></div>
    <div id="list-status"></div>
  </section>

  <!-- DETAIL VIEW -->
  <section id="detail-view" style="display:none;">
    <div class="detail-toolbar">
      <a href="#" class="btn" id="back-btn">← All projects</a>
      <a href="#" class="btn primary" id="github-btn" target="_blank" rel="noopener">View on GitHub ↗</a>
    </div>
    <div class="repo-title">
      <h2 id="repo-name"></h2>
      <span class="sub" id="repo-sub"></span>
    </div>
    <div class="repo-meta" id="repo-meta"></div>
    <div class="topics" id="repo-topics" style="margin-bottom:14px;"></div>
    <div id="readme" class="readme"></div>
  </section>

</main>

<footer class="site">
  Built as a static page · Hosted free on GitHub Pages · Data fetched live from the GitHub API ·
  <a href="https://github.com/JayKimProject" target="_blank" rel="noopener">@JayKimProject</a>
</footer>

<script>
const USER = 'JayKimProject';
const PER_PAGE = 100;

// ---------- State ----------
let allRepos = [];
let filteredRepos = [];

// ---------- DOM ----------
const grid = document.getElementById('grid');
const listStatus = document.getElementById('list-status');
const searchEl = document.getElementById('search');
const sortEl = document.getElementById('sort');
const statEl = document.getElementById('stat');
const listView = document.getElementById('list-view');
const detailView = document.getElementById('detail-view');
const backBtn = document.getElementById('back-btn');

// ---------- Fetch all repos (paginated) ----------
async function loadRepos() {
  listStatus.innerHTML = '<div class="loading"><span class="spinner"></span> Loading repositories…</div>';
  try {
    let page = 1, all = [];
    while (true) {
      const res = await fetch(`https://api.github.com/users/${USER}/repos?per_page=${PER_PAGE}&page=${page}&sort=updated`);
      if (!res.ok) throw new Error(`GitHub API error: ${res.status} ${res.statusText}`);
      const data = await res.json();
      all = all.concat(data);
      if (data.length < PER_PAGE) break;
      page++;
    }
    allRepos = all.filter(r => !r.fork || true); // include forks; flip to exclude
    listStatus.innerHTML = '';
    render();
  } catch (e) {
    listStatus.innerHTML = `<div class="error">Could not load repositories: ${e.message}<br><small>The GitHub public API is rate-limited (60 requests/hour per IP). Try again in a few minutes.</small></div>`;
  }
}

// ---------- Render list ----------
function render() {
  const q = searchEl.value.trim().toLowerCase();
  filteredRepos = allRepos.filter(r => {
    if (!q) return true;
    const hay = [
      r.name, r.description || '',
      (r.topics || []).join(' '),
      r.language || ''
    ].join(' ').toLowerCase();
    return hay.includes(q);
  });
  const s = sortEl.value;
  filteredRepos.sort((a,b) => {
    if (s === 'name') return a.name.localeCompare(b.name);
    if (s === 'stars') return (b.stargazers_count||0) - (a.stargazers_count||0);
    if (s === 'created') return new Date(b.created_at) - new Date(a.created_at);
    if (s === 'pushed') return new Date(b.pushed_at) - new Date(a.pushed_at);
    return new Date(b.updated_at) - new Date(a.updated_at);
  });
  statEl.textContent = `${filteredRepos.length} of ${allRepos.length} repositories`;
  grid.innerHTML = filteredRepos.map(card).join('') ||
    '<div class="empty">No repositories match your search.</div>';
}
function fmtDate(d) { return new Date(d).toLocaleDateString('en-US', {year:'numeric', month:'short', day:'numeric'}); }
function langClass(l) {
  if (!l) return 'l-Other';
  const safe = l.replace(/\+/g,'P').replace(/[^A-Za-z]/g,'');
  return 'l-' + safe;
}
function escapeHTML(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function card(r) {
  const topics = (r.topics || []).slice(0, 4).map(t => `<span class="chip">${escapeHTML(t)}</span>`).join(' ');
  return `
    <div class="card" data-name="${escapeHTML(r.name)}">
      <div class="name">${escapeHTML(r.name)}</div>
      <div class="desc">${escapeHTML(r.description || 'No description provided.')}</div>
      <div class="topics">${topics}</div>
      <div class="meta">
        ${r.language ? `<span class="lang"><span class="dot ${langClass(r.language)}"></span>${escapeHTML(r.language)}</span>` : ''}
        <span>★ ${r.stargazers_count}</span>
        <span>Updated ${fmtDate(r.updated_at)}</span>
      </div>
    </div>`;
}

// ---------- Detail view ----------
async function showDetail(name) {
  const repo = allRepos.find(r => r.name === name);
  if (!repo) return;
  listView.style.display = 'none';
  detailView.style.display = '';
  window.scrollTo(0, 0);

  document.getElementById('repo-name').textContent = repo.name;
  document.getElementById('repo-sub').textContent = repo.description || '';
  document.getElementById('github-btn').href = repo.html_url;

  const meta = [];
  if (repo.language) meta.push(`<span class="lang"><span class="dot ${langClass(repo.language)}"></span>${escapeHTML(repo.language)}</span>`);
  meta.push(`★ ${repo.stargazers_count} stars`);
  meta.push(`⑂ ${repo.forks_count} forks`);
  meta.push(`Created ${fmtDate(repo.created_at)}`);
  meta.push(`Updated ${fmtDate(repo.updated_at)}`);
  if (repo.license && repo.license.spdx_id) meta.push(`License: ${escapeHTML(repo.license.spdx_id)}`);
  document.getElementById('repo-meta').innerHTML = meta.join(' · ');

  const topics = (repo.topics || []).map(t => `<span class="chip">${escapeHTML(t)}</span>`).join(' ');
  document.getElementById('repo-topics').innerHTML = topics;

  const rdEl = document.getElementById('readme');
  rdEl.innerHTML = '<div class="loading"><span class="spinner"></span> Loading README…</div>';

  try {
    const res = await fetch(`https://api.github.com/repos/${USER}/${name}/readme`, {
      headers: { Accept: 'application/vnd.github.v3.raw' }
    });
    if (res.status === 404) {
      rdEl.innerHTML = '<p style="color:var(--muted)">This repository has no README.</p>';
      return;
    }
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const md = await res.text();
    const branch = repo.default_branch || 'main';
    const baseRaw = `https://raw.githubusercontent.com/${USER}/${name}/${branch}/`;
    const baseBlob = `${repo.html_url}/blob/${branch}/`;

    // Custom marked renderer to fix relative URLs
    const renderer = new marked.Renderer();
    const origImage = renderer.image.bind(renderer);
    renderer.image = (href, title, text) => {
      if (href && !/^https?:|^data:/i.test(href)) href = baseRaw + href.replace(/^\.?\/?/, '');
      return origImage(href, title, text);
    };
    const origLink = renderer.link.bind(renderer);
    renderer.link = (href, title, text) => {
      if (href && !/^https?:|^mailto:|^#/i.test(href)) href = baseBlob + href.replace(/^\.?\/?/, '');
      return origLink(href, title, text);
    };
    marked.use({ renderer });
    const html = marked.parse(md);
    rdEl.innerHTML = DOMPurify.sanitize(html);
  } catch (e) {
    rdEl.innerHTML = `<p class="error">Could not load README: ${escapeHTML(e.message)}</p>`;
  }
}

function showList() {
  detailView.style.display = 'none';
  listView.style.display = '';
}

// ---------- Routing via hash ----------
function route() {
  const h = location.hash;
  if (h.startsWith('#/repo/')) {
    const name = decodeURIComponent(h.slice('#/repo/'.length));
    showDetail(name);
  } else {
    showList();
  }
}

// ---------- Event wiring ----------
grid.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const name = card.dataset.name;
  location.hash = `#/repo/${encodeURIComponent(name)}`;
});
backBtn.addEventListener('click', e => { e.preventDefault(); location.hash = ''; });
searchEl.addEventListener('input', render);
sortEl.addEventListener('change', render);
window.addEventListener('hashchange', route);

// ---------- Boot ----------
(async () => {
  await loadRepos();
  route();
})();
</script>
</body>
</html>
